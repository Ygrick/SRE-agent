# LiteLLM Proxy Configuration
# Docs: docs/specs/llm-gateway.md
# Add providers: docs/guides/add-provider.md

model_list:
  # =============================================
  # Step 3.5 Flash (primary — fast 2-5s, good quality)
  # =============================================
  - model_name: "step-3.5-flash"
    litellm_params:
      model: "openai/stepfun/step-3.5-flash:free"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "os.environ/OPENROUTER_API_KEY"
      input_cost_per_token: 0.000001
      output_cost_per_token: 0.000004
      rpm: 30
      tpm: 120000
      max_parallel_requests: 3         # free tier concurrency limit
    model_info:
      id: "openrouter-step-3.5-flash"
      priority: 0       # highest priority — 2-5s latency, stable

  # =============================================
  # MiniMax M2.7 (fallback — large, expensive, high quality)
  # =============================================
  - model_name: "minimax-m2.7"
    litellm_params:
      model: "openai/minimax/minimax-m2.7"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "os.environ/OPENROUTER_API_KEY"
      input_cost_per_token: 0.0000003
      output_cost_per_token: 0.0000012
      rpm: 30
      tpm: 120000
      max_parallel_requests: 5         # paid tier allows more concurrency
    model_info:
      id: "openrouter-minimax-m2.7"
      priority: 1       # fallback — $0.30/$1.20 per M tokens

  # =============================================
  # Optional: vLLM gpt-oss-20b on GPU (uncomment when available)
  # См. vllm/Dockerfile и docs/guides/deploy-vllm.md
  # =============================================
  # - model_name: "gpt-oss-20b"
  #   litellm_params:
  #     model: "openai/openai/gpt-oss-20b"
  #     api_base: "http://<GPU_HOST>:8000/v1"
  #     api_key: "none"
  #     input_cost_per_token: 0.0
  #     output_cost_per_token: 0.0
  #   model_info:
  #     id: "vllm-local"
  #     priority: 0

router_settings:
  routing_strategy: "latency-based-routing"   # приоритет быстрому провайдеру
  allowed_fails: 3                            # 3 ошибки → cooldown
  cooldown_time: 30                           # 30 секунд в cooldown
  num_retries: 2                              # 2 retry перед failover
  timeout: 120                                # таймаут на запрос
  enable_pre_call_checks: true                # health-check перед routing
  fallbacks:                                  # failover между моделями
    - step-3.5-flash: ["minimax-m2.7"]
    - minimax-m2.7: ["step-3.5-flash"]

litellm_settings:
  drop_params: true
  set_verbose: false
  success_callback: ["prometheus", "langfuse"]
  failure_callback: ["prometheus", "langfuse"]

general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
  database_url: "os.environ/LITELLM_DATABASE_URL"
  store_model_in_db: true                     # динамическая регистрация через API

guardrails:
  - guardrail_name: "sre-prompt-injection"
    litellm_params:
      guardrail: "custom_guardrail.PromptInjectionGuardrail"
      mode: "pre_call"
      default_on: true
  - guardrail_name: "sre-secret-leak"
    litellm_params:
      guardrail: "custom_guardrail.SecretLeakGuardrail"
      mode: "pre_call"
      default_on: true
