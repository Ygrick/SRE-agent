# Docker Compose для развёртывания vLLM с gpt-oss-20b на GPU
#
# Использование:
#   docker compose -f vllm/docker-compose.vllm.yml up -d
#
# Требования:
#   - NVIDIA GPU с ≥24GB VRAM (RTX 3090/4090, A100, L40S)
#   - nvidia-container-toolkit установлен
#   - Docker с поддержкой --gpus

services:
  vllm:
    image: vllm/vllm-openai:latest
    ports:
      - "8000:8000"
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    volumes:
      - vllm_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      --model openai/gpt-oss-20b
      --dtype auto
      --max-model-len 32768
      --gpu-memory-utilization 0.90
      --host 0.0.0.0
      --port 8000
      --trust-remote-code
      --enable-auto-tool-choice
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  vllm_cache:
