# Docker Compose для развёртывания vLLM с gpt-oss-20b на GPU
#
# Использование:
#   docker compose -f vllm/docker-compose.vllm.yml up -d
#
# Требования:
#   - NVIDIA GPU с ≥16GB VRAM (RTX 4090, A5000, H100)
#   - nvidia-container-toolkit установлен
#   - Docker с поддержкой --gpus
#
# Модель: openai/gpt-oss-20b
#   - 21B params total, 3.6B active (MoE)
#   - Уже квантизирована MXFP4 — не нужно указывать --quantization
#   - ~16GB VRAM на одном GPU

services:
  vllm:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    volumes:
      - vllm_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # Без дополнительных флагов: MXFP4 встроен, single GPU, dtype auto
    command: ["openai/gpt-oss-20b", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s  # Загрузка модели может занять 2-3 минуты

volumes:
  vllm_cache:
